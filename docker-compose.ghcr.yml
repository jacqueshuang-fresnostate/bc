services:
  bc:
    image: ghcr.io/sydneypoole/bc:${BC_IMAGE_TAG:?请设置 BC_IMAGE_TAG，例如 sha-fca561e 或 v2026.06.23-1}
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      BACKEND_PORT: "8080"
      BACKEND_STARTUP_TIMEOUT_SECONDS: "${BACKEND_STARTUP_TIMEOUT_SECONDS:-60}"
      BACKEND_STARTUP_LOG_INTERVAL_SECONDS: "${BACKEND_STARTUP_LOG_INTERVAL_SECONDS:-2}"
      RUST_LOG: "${RUST_LOG:-info}"
      DATABASE_URL: "${DATABASE_URL:?请设置 DATABASE_URL，例如 postgresql://user:password@host:5432/db}"
      DATABASE_MAX_CONNECTIONS: "${DATABASE_MAX_CONNECTIONS:-30}"
      DATABASE_MIN_CONNECTIONS: "${DATABASE_MIN_CONNECTIONS:-2}"
      DATABASE_ACQUIRE_TIMEOUT_SECONDS: "${DATABASE_ACQUIRE_TIMEOUT_SECONDS:-10}"
      REDIS_URL: "${REDIS_URL:-}"
